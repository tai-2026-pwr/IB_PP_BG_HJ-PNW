line-length = 100
target-version = "py314"
extend-include = ["*.ipynb"]

[lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "UP",  # pyupgrade
  "N",   # pep8-naming
  "PD",  # pandas-vet
  "NPY", # NumPy-specific rules
  "RUF", # Ruff-specific rules
]

ignore = [
  "E501", # Ignore line-length violations in linting
]

[lint.per-file-ignores]
"*.ipynb" = ["E402", "F401"]
"__init__.py" = ["F401"]

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
